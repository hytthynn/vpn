name: Subscription Reminder

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  trigger-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          REMINDER_URL: ${{ secrets.REMINDER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$REMINDER_URL" ]; then
            echo "REMINDER_URL secret is required"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is required"
            exit 1
          fi

      - name: Call subscription reminder endpoint
        env:
          REMINDER_URL: ${{ secrets.REMINDER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            --header "Authorization: Bearer $CRON_SECRET" \
            --max-time 30 \
            "$REMINDER_URL"
